font_family      JetBrains Mono
font_size 10

cursor #ad8ee6
cursor_shape block

#: The cursor shape can be one of block, beam, underline. Note that
cursor_beam_thickness 1.5
background_opacity 1
window_padding_width 8

[blur]
background=true
background #000000


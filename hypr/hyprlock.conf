general {
   no_fade_in = false
   disable_loading_bar = false
}

background {
    monitor = 
    # Captura la pantalla actual (incluyendo el fondo de swww)
    path = screenshot
    
    # Aplica desenfoque para que se vea elegante y resalte el login
    blur_passes = 2
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Reloj central
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 120
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 80
    halign = center
    valign = center
}

# Saludo con nombre de usuario
label {
    monitor =
    text = Hola, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}
# Campo de entrada de contraseña
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    # Colores de estado
    outer_color = rgba(15, 15, 15, 0)
    inner_color = rgba(200, 200, 200, 0.8)
    font_color = rgb(10, 10, 10)
    
    # --- INDICADOR DE MAYÚSCULAS ---
    check_color = rgb(204, 136, 34)    # Color al validar (Naranja)
    fail_color = rgb(204, 34, 34)     # Color si fallas (Rojo)
    capslock_color = rgb(255, 0, 0)   # Color del borde si Mayúsculas está ON (Rojo brillante)
    
    fade_on_empty = true
    placeholder_text = <i>Contraseña...</i>
    
    position = 0, -100
    halign = center
    valign = center
}

